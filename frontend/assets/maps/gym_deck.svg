<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400" width="1000" height="1400" font-family="sans-serif">
  <!-- background / outer shell -->
  <rect x="0" y="0" width="1000" height="1400" fill="#eef2f4"/>
  <rect x="50" y="60" width="900" height="1240" rx="8" fill="#f8fafb" stroke="#2b3b42" stroke-width="8"/>

  <!-- line of bleachers above (faint) -->
  <line x1="655" y1="70" x2="655" y2="940" stroke="#c4ced3" stroke-width="3" stroke-dasharray="10 8"/>

  <!-- big open areas -->
  <rect x="70" y="210" width="560" height="430" rx="6" fill="#eaf1f3" stroke="#b3c0c6" stroke-width="2"/>
  <text x="350" y="428" text-anchor="middle" font-size="30" font-weight="700" fill="#4a5a62" letter-spacing="2">CAFETERIA</text>

  <rect x="70" y="660" width="560" height="620" rx="6" fill="#e4eef1" stroke="#9fb3ba" stroke-width="2"/>
  <text x="350" y="960" text-anchor="middle" font-size="34" font-weight="700" fill="#3e4f57" letter-spacing="2">SPORTS AREA</text>
  <text x="350" y="998" text-anchor="middle" font-size="20" font-weight="500" fill="#6b7a81" letter-spacing="1">(GYMNASIUM)</text>

  <!-- airwell (top-left, open) -->
  <rect x="70" y="75" width="130" height="105" rx="4" fill="none" stroke="#b3c0c6" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="135" y="132" text-anchor="middle" font-size="16" font-weight="600" fill="#859399" letter-spacing="1">AIRWELL</text>

  <!-- top rooms -->
  <rect x="250" y="75" width="120" height="115" rx="4" fill="#ffffff" stroke="#b3c0c6" stroke-width="2"/>
  <text x="310" y="128" text-anchor="middle" font-size="16" font-weight="600" fill="#55636b">ELEC</text>
  <text x="310" y="148" text-anchor="middle" font-size="16" font-weight="600" fill="#55636b">ROOM</text>

  <rect x="390" y="75" width="250" height="115" rx="4" fill="#ffffff" stroke="#b3c0c6" stroke-width="2"/>
  <text x="515" y="138" text-anchor="middle" font-size="18" font-weight="600" fill="#55636b">EMPLOYEE LOUNGE</text>

  <!-- fire exit -->
  <rect x="770" y="75" width="180" height="90" rx="4" fill="#f3e7e7" stroke="#c9a4a4" stroke-width="2"/>
  <text x="860" y="126" text-anchor="middle" font-size="18" font-weight="700" fill="#a15a5a">F.E.</text>

  <!-- right service column -->
  <rect x="700" y="185" width="250" height="150" rx="4" fill="#ffffff" stroke="#b3c0c6" stroke-width="2"/>
  <text x="825" y="252" text-anchor="middle" font-size="16" font-weight="600" fill="#55636b">HE SHOWER &amp;</text>
  <text x="825" y="274" text-anchor="middle" font-size="16" font-weight="600" fill="#55636b">LOCKER AREA</text>

  <rect x="700" y="355" width="250" height="130" rx="4" fill="#ffffff" stroke="#b3c0c6" stroke-width="2"/>
  <text x="825" y="412" text-anchor="middle" font-size="16" font-weight="600" fill="#55636b">SHE SHOWER &amp;</text>
  <text x="825" y="434" text-anchor="middle" font-size="16" font-weight="600" fill="#55636b">LOCKER AREA</text>

  <!-- elevator lobby + elevator -->
  <rect x="660" y="560" width="145" height="135" rx="4" fill="#dbe7ec" stroke="#8fa9b3" stroke-width="2"/>
  <text x="732" y="620" text-anchor="middle" font-size="15" font-weight="700" fill="#43606b">ELEVATOR</text>
  <text x="732" y="640" text-anchor="middle" font-size="15" font-weight="700" fill="#43606b">LOBBY</text>

  <rect x="815" y="545" width="120" height="120" rx="4" fill="#cdd9de" stroke="#8fa9b3" stroke-width="2"/>
  <text x="875" y="610" text-anchor="middle" font-size="16" font-weight="700" fill="#43606b">ELEV</text>

  <!-- stairs -->
  <g stroke="#8fa9b3" stroke-width="2">
    <rect x="700" y="715" width="200" height="185" rx="4" fill="#e7eef1"/>
    <line x1="700" y1="745" x2="900" y2="745"/>
    <line x1="700" y1="775" x2="900" y2="775"/>
    <line x1="700" y1="805" x2="900" y2="805"/>
    <line x1="700" y1="835" x2="900" y2="835"/>
    <line x1="700" y1="865" x2="900" y2="865"/>
  </g>
  <text x="800" y="812" text-anchor="middle" font-size="15" font-weight="600" fill="#5a6d75">STAIRS</text>

  <!-- office + storage -->
  <rect x="740" y="950" width="210" height="105" rx="4" fill="#ffffff" stroke="#b3c0c6" stroke-width="2"/>
  <text x="845" y="1008" text-anchor="middle" font-size="17" font-weight="600" fill="#55636b">OFFICE</text>

  <rect x="740" y="1075" width="210" height="205" rx="4" fill="#ffffff" stroke="#b3c0c6" stroke-width="2"/>
  <text x="845" y="1172" text-anchor="middle" font-size="16" font-weight="600" fill="#55636b">ASSET'S</text>
  <text x="845" y="1194" text-anchor="middle" font-size="16" font-weight="600" fill="#55636b">STORAGE</text>
</svg>
